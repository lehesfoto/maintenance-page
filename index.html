<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Koduleht hoolduses</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:'Inter',sans-serif;
      background:#000;
      color:#fff;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    /* =========================
       Background Image
    ========================== */

    .bg{
      position:absolute;
      inset:0;

      background:
        linear-gradient(
          135deg,
          rgba(0,0,0,0.55),
          rgba(0,0,0,0.25)
        ),
        url("DJI_0306.jpg");

      background-size:cover;
      background-position:center;

      transform:scale(1.08);

      animation:slowZoom 18s ease-in-out infinite alternate;
    }

    @keyframes slowZoom{
      from{
        transform:scale(1.05);
      }
      to{
        transform:scale(1.12);
      }
    }

    /* =========================
       Floating Blur Orbs
    ========================== */

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:.45;
      animation:float 12s infinite ease-in-out;
    }

    .orb1{
      width:320px;
      height:320px;
      background:#00ffb3;
      top:-80px;
      left:-80px;
    }

    .orb2{
      width:260px;
      height:260px;
      background:#008cff;
      bottom:-60px;
      right:-40px;
      animation-delay:2s;
    }

    .orb3{
      width:220px;
      height:220px;
      background:#ffffff;
      top:40%;
      left:60%;
      opacity:.18;
      animation-delay:4s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px) translateX(0px);
      }
      50%{
        transform:translateY(-25px) translateX(15px);
      }
      100%{
        transform:translateY(0px) translateX(0px);
      }
    }

    /* =========================
       Glass Card
    ========================== */

    .card{
      position:relative;
      z-index:5;

      width:min(92%, 620px);

      padding:60px 50px;

      border-radius:34px;

      background:rgba(255,255,255,0.10);

      border:1px solid rgba(255,255,255,0.16);

      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);

      box-shadow:
        0 10px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.12);

      text-align:center;

      overflow:hidden;
    }

    /* shine effect */

    .card::before{
      content:"";

      position:absolute;

      width:180px;
      height:180%;

      background:linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(255,255,255,0.18),
        rgba(255,255,255,0)
      );

      transform:rotate(25deg);

      top:-40%;
      left:-180px;

      animation:shine 8s infinite;
    }

    @keyframes shine{
      0%{
        left:-250px;
      }
      100%{
        left:120%;
      }
    }

    /* =========================
       Typography
    ========================== */

    .status{
      display:inline-flex;
      align-items:center;
      gap:10px;

      padding:10px 18px;

      border-radius:999px;

      margin-bottom:28px;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.10);

      font-size:.92rem;
      font-weight:500;
      color:rgba(255,255,255,.88);
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#00ff88;

      box-shadow:0 0 12px #00ff88;

      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
        opacity:1;
      }
      50%{
        transform:scale(1.35);
        opacity:.7;
      }
      100%{
        transform:scale(1);
        opacity:1;
      }
    }

    h1{
      font-size:clamp(2.3rem,5vw,4rem);

      line-height:1.05;

      margin-bottom:24px;

      font-weight:700;

      letter-spacing:-2px;
    }

    p{
      color:rgba(255,255,255,0.82);

      font-size:1.08rem;

      line-height:1.8;

      margin-bottom:40px;
    }

    /* =========================
       Buttons
    ========================== */

    .buttons{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      text-decoration:none;

      color:#fff;

      padding:16px 28px;

      border-radius:18px;

      font-weight:600;

      transition:all .28s ease;

      position:relative;

      overflow:hidden;

      border:1px solid rgba(255,255,255,0.14);

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);
    }

    .btn:hover{
      transform:translateY(-4px);

      background:rgba(255,255,255,0.16);

      box-shadow:0 12px 30px rgba(0,0,0,0.30);
    }

    .btn-primary{
      background:linear-gradient(
        135deg,
        rgba(0,255,179,0.28),
        rgba(0,140,255,0.24)
      );
    }

    .footer{
      margin-top:34px;

      color:rgba(255,255,255,.55);

      font-size:.92rem;
    }

    /* =========================
       Mobile
    ========================== */

    @media(max-width:640px){

      .card{
        padding:45px 28px;
        border-radius:28px;
      }

      h1{
        font-size:2.4rem;
      }

      p{
        font-size:1rem;
      }

      .buttons{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="card">

    <div class="status">
      <div class="dot"></div>
      Veebileht on hoolduses
    </div>

    <p>
      Töötame hetkel veebilehe kallal.<br>
      Seniks jälgi meid sotsiaalmeedias ja võta ühendust Facebooki või Instagrami kaudu.
    </p>

    <div class="buttons">

      <a
        class="btn btn-primary"
        href="https://www.facebook.com/LehesFoto"
        target="_blank"
      >
        Facebook
      </a>

      <a
        class="btn"
        href="https://www.instagram.com/lehesfoto"
        target="_blank"
      >
        Instagram
      </a>

    </div>

    <div class="footer">
      Tuleme peagi tagasi 🚀
    </div>

  </div>

</body>
</html>

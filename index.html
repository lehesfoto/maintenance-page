<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koduleht hoolduses</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      height: 100vh;
      overflow: hidden;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #000;
    }

    /* Taustapilt */
    .background {
      position: absolute;
      inset: 0;
      background: url("DJI_0306.jpg") center center / cover no-repeat;
      transform: scale(1.05);
    }

    /* Tume overlay */
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Klaasjas kaart */
    .glass-card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 520px;
      padding: 50px 40px;
      border-radius: 28px;

      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      border: 1px solid rgba(255, 255, 255, 0.15);

      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.15);

      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.88);
      margin-bottom: 35px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      color: white;
      padding: 14px 24px;
      border-radius: 14px;
      font-weight: 600;
      transition: 0.25s ease;
      border: 1px solid rgba(255,255,255,0.2);

      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
    }

    @media (max-width: 600px) {
      .glass-card {
        padding: 40px 25px;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="glass-card">
    <h1>Koduleht on hoolduses</h1>

    <p>
      Töötame hetkel uue ja parema veebilehe kallal.<br>
      Seniks jälgi meid sotsiaalmeedias vői vőta ühendust Facebooki ja Instagrami kaudu.
    </p>

    <div class="buttons">
      <a class="btn" href="https://facebook.com/SINU_LEHT" target="_blank">
        Facebook
      </a>

      <a class="btn" href="https://instagram.com/SINU_LEHT" target="_blank">
        Instagram
      </a>
    </div>

    <div class="footer">
      Tuleme peagi tagasi ??
    </div>
  </div>

</body>
</html>
